model:
  use_init: True
  opt_cams: False #True
  opt_scale: True
  async_tracks: True

overwrite: False
run_opt: True
run_vis: True
run_prior: True
datatype: ${data.video_dir}
vis:
  phases:
    # - motion_chunks
    # - input
    # - root_fit
    - smooth_fit
    - prior
    # - init
  render_views:
    - above
    - side
    - front
    - src_cam
  make_grid: True
  overwrite: True
  render_keypoints: False  # Overlay GT 2D keypoints on source camera view

MANO:
  MODEL_PATH: ${paths.MANO_DIR}
  GENDER: neutral
  NUM_HAND_JOINTS: 15
  MEAN_PARAMS: ${paths.MANO_DIR}/mano_mean_params.npz
  CREATE_BODY_POSE: FALSE

paths:
  base_dir: null
  MANO_DIR: mano
  vposer: VPoser/pretrained/Vposer_right_mirrored

HMP:
  config: hmp_config.yaml
  use_hposer: False
  vid_path: ${data.root}/video/${data.seq}.mp4
  exp_name: None
  model_dir: hmp_model
  data_dir: hmp_model

fps: 30
temporal_smooth: True
is_static: False
